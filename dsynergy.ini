# Monitor (0 - Window; !=0 avaliable monitors)
Monitor = 0
# Maximum framerate. Depedends on VSync.
FPSCap = 2000
Width = 1366
Height = 768
Fullscreen = false
# Maximum Framerate set to refresh rate if enabled
VSync = false
# Water Effects (e.g. water reflections) {NONE=0, LOW=1, MEDIUM=2, HIGH=3, ULTRA=4}
WaterEffects = 0
# Shadow Effects (e.g. water reflections) {NONE=0, LOW=1, MEDIUM=2, HIGH=3, ULTRA=4}
ShadowEffects = 0
MouseSensitivity = 1.5
MusicVolume = 0.2
SoundFXVolume = 0.2
# Log Level {ERR=0(default), DEBUG=1, ALL=2}
LogLevel = 0
# If true generate log file, otherwise print only to console. Used in conjuction with log level.
LogToFile = false
BlockDynamicSize = 50
TextDynamicSize = 10
# Renderer strength. May Improve performance. Number passes per ticks. Allowed values 1-160
RendererPasses = 10
# Optimization strength. May Improve performance. Number passes per optimization run. Allowed values 1-64
OptimizationPasses = 8
# Texture size. Must be power of two, non-zero and lesser or equal than 4096.
TextureSize = 512
# Game Ticks (decimal). Must be greater or equal zero
GameTicks = 0.0
# Game Time (decimal). Must be metween (0, 5]
GameTimeMultiplier = 1.0
# Block number load per cache run. Must be metween (0, 25000]
BlocksPerRun = 1000
